[workspace]
members = []
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/LiuMengxuan04/MiniCode"
authors = ["Liu Mengxuan"]

[workspace.dependencies]

[workspace.lints.rust]
unsafe_code = "forbid"
unused_crate_dependencies = "warn"
unused_imports = "warn"
unused_must_use = "warn"

[workspace.lints.clippy]
dbg_macro = "warn"
todo = "warn"
unwrap_used = "warn"
